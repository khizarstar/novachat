<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVACORE — Commands</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-gradient: radial-gradient(circle at top, #1a1708 0%, #0a0a0a 70%);
            --card-bg: #14120a;
            --gold: #d4af37;
            --gold-light: #f5d677;
            --text-main: #ffffff;
            --text-muted: #a69a75;
            --border-gold: rgba(212, 175, 55, 0.3);
            --input-bg: #1a1708;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-dark);
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Navbar */
        .navbar { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 20px; }
        .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; color: var(--gold); text-decoration: none; font-size: 1.1rem; }
        .nav-brand img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--gold); }
        .nav-links { display: flex; gap: 25px; list-style: none; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--gold-light); }
        .nav-links a.active { border-bottom: 2px solid var(--gold); padding-bottom: 4px; }
        .nav-invite-btn { background-color: var(--gold); color: #000; padding: 8px 18px; border-radius: 6px; text-decoration: none; font-weight: 700; font-size: 0.85rem; }

        /* Main Container */
        .main-container { max-width: 900px; width: 90%; margin-top: 40px; }
        .title-card { background: var(--card-bg); border: 1px solid var(--border-gold); border-radius: 12px; padding: 35px; margin-bottom: 30px; text-align: center; }
        .title-card h1 { color: var(--gold); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }

        /* Dashboard & Table */
        .dashboard-box { background: var(--card-bg); border: 1px solid var(--border-gold); border-radius: 12px; padding: 35px; }
        .search-input { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border-gold); border-radius: 8px; color: white; margin-bottom: 20px; outline: none; }
        .cmd-table { width: 100%; border-collapse: collapse; }
        .cmd-table th { color: var(--gold); font-size: 0.8rem; text-transform: uppercase; padding: 15px; border-bottom: 1px solid var(--border-gold); }
        .cmd-table td { padding: 16px; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
        .cmd-name { color: var(--gold-light); font-family: monospace; font-weight: bold; }
        .cmd-badge { background: #2a2512; color: var(--gold-light); padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-brand"><img src="bot.png" alt="NOVACORE"> <span>NOVACORE</span></a>
        <ul class="nav-links">
            <li><a href="novacore.html">Home</a></li>
            <li><a href="features.html">Features</a></li>
            <li><a href="commands.html" class="active">Commands</a></li>
            <li><a href="faq.html">FAQ</a></li>
        </ul>
        <a href="https://discord.com/oauth2/authorize?client_id=1514950865960571001" class="nav-invite-btn">Invite Bot</a>
    </nav>

    <div class="main-container">
        <div class="title-card">
            <h1>Bot Commands</h1>
            <p style="color: var(--text-muted);">Explore the comprehensive array of configurations for NOVACORE.</p>
        </div>

        <div class="dashboard-box">
            <input type="text" id="searchBar" class="search-input" onkeyup="searchCommands()" placeholder="Search commands...">
            <table class="cmd-table" id="commandTable">
                <thead>
                    <tr><th>Command</th><th>Category</th><th>Description</th></tr>
                </thead>
                <tbody>
                    <tr><td class="cmd-name">/help</td><td><span class="cmd-badge">General</span></td><td>Displays the global interaction menu.</td></tr>
                    <tr><td class="cmd-name">/setup</td><td><span class="cmd-badge">Configuration</span></td><td>Initializes custom logic for environment setup.</td></tr>
                    <!-- Add more rows as needed -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function searchCommands() {
            var filter = document.getElementById("searchBar").value.toUpperCase();
            var tr = document.getElementById("commandTable").getElementsByTagName("tr");
            for (var i = 1; i < tr.length; i++) {
                var text = tr[i].textContent || tr[i].innerText;
                tr[i].style.display = text.toUpperCase().indexOf(filter) > -1 ? "" : "none";
            }
        }
    </script>
</body>
</html>
