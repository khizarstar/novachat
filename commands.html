<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commands — Nova Chat</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-gradient: radial-gradient(circle at top, #1a1708 0%, #0a0a0a 70%);
            --card-bg: #14120a;
            --gold: #d4af37;
            --gold-light: #f5d677;
            --text-main: #ffffff;
            --text-muted: #a69a75;
            --border-gold: rgba(212, 175, 55, 0.3);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

        /* Navbar */
        .navbar { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 20px; }
        .nav-brand { display: flex; align-items: center; gap: 12px; color: var(--text-main); text-decoration: none; font-weight: 700; }
        .nav-brand img { width: 40px; height: 40px; border-radius: 50%; }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--gold); }
        .nav-invite-btn { background-color: var(--gold); color: #000; padding: 8px 20px; border-radius: 6px; text-decoration: none; font-weight: 700; font-size: 0.85rem; }

        /* Commands Section */
        .content { max-width: 800px; width: 90%; margin: 50px auto; }
        h1 { color: var(--gold); text-align: center; margin-bottom: 30px; }
        .cmd-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border-gold); }
        .cmd-table td { padding: 20px; border-bottom: 1px solid var(--border-gold); color: var(--text-muted); font-family: monospace; font-size: 1.1rem; }
        .cmd-name { color: var(--gold-light); font-weight: bold; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="https://khizarstar.github.io/novachat/index.html" class="nav-brand">
            <img src="bot.png" alt="Nova Chat"> Nova Chat
        </a>
        <ul class="nav-links">
            <li><a href="https://khizarstar.github.io/novachat/index.html">Home</a></li>
            <li><a href="https://khizarstar.github.io/novachat/features.html">Features</a></li>
            <li><a href="https://khizarstar.github.io/novachat/commands.html">Commands</a></li>
            <li><a href="https://khizarstar.github.io/novachat/guidelines.html">Guidelines</a></li>
        </ul>
        <a href="https://top.gg/bot/1493498407271141536/invite" class="nav-invite-btn">Invite Bot</a>
    </nav>

    <main class="content">
        <h1>Slash Commands</h1>
        <table class="cmd-table">
            <tr><td class="cmd-name">/activate channel</td></tr>
            <tr><td class="cmd-name">/generate</td></tr>
            <tr><td class="cmd-name">/ping</td></tr>
            <tr><td class="cmd-name">/remove channel</td></tr>
            <tr><td class="cmd-name">/reset</td></tr>
            <tr><td class="cmd-name">/vc join</td></tr>
            <tr><td class="cmd-name">/vc leave</td></tr>
        </table>
    </main>

</body>
</html>
