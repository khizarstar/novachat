<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home — Nova Chat</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-gradient: radial-gradient(circle at top, #1a1708 0%, #0a0a0a 70%);
            --card-bg: #14120a;
            --gold: #d4af37;
            --gold-light: #f5d677;
            --text-main: #ffffff;
            --text-muted: #a69a75;
            --border-gold: rgba(212, 175, 55, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-dark);
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Navbar */
        .navbar { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 20px; }
        .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; color: var(--gold); text-decoration: none; font-size: 1.1rem; }
        .nav-brand img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--gold); }
        .nav-links { display: flex; gap: 25px; list-style: none; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--gold-light); }
        .nav-links a.active { border-bottom: 2px solid var(--gold); padding-bottom: 4px; }
        .nav-invite-btn { background-color: var(--gold); color: #000; padding: 8px 18px; border-radius: 6px; text-decoration: none; font-weight: 700; font-size: 0.85rem; }

        /* Main Content */
        .hero { text-align: center; margin-top: 100px; padding: 20px; }
        .hero h1 { font-size: 3.5rem; color: var(--gold); margin-bottom: 20px; }
        .hero p { color: var(--text-muted); font-size: 1.2rem; max-width: 600px; margin: 0 auto 30px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-brand"><img src="bot.png" alt="Nova Chat"> <span>Nova Chat</span></a>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="features.html">Features</a></li>
            <li><a href="commands.html">Commands</a></li>
            <li><a href="guidelines.html">Guidelines</a></li>
        </ul>
        <a href="https://top.gg/bot/1493498407271141536/invite" class="nav-invite-btn">Invite Bot</a>
    </nav>

    <main class="hero">
        <h1>NOVA CHAT</h1>
        <p>Your intelligent, adaptable AI assistant designed to deliver a professional, friendly, and reliable experience for every conversation.</p>
    </main>

</body>
</html>
